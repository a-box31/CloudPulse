# fly.toml app configuration file generated for personalcloud on 2026-03-28T11:17:38-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'personalcloud'
primary_region = 'ord'

[build]

[deploy]
  release_command = 'node node_modules/prisma/build/index.js migrate deploy'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
