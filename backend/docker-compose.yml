services:
  backend:
    image: personalcloud-backend
    build: .
    restart: unless-stopped
    network_mode: host
    environment:
      CLOUD_URL: ${CLOUD_URL}
      SERVER_ID: ${SERVER_ID}
      API_KEY: ${API_KEY}
      ROOT_DIR: /data
      PORT: ${PORT:-4000}
    volumes:
      - ${HOST_FILES_DIR:-./files}:/data
