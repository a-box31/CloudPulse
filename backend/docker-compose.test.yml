# Example docker-compose for pulling the pre-built PersonalCloud backend.
# Copy this file as docker-compose.yml and fill in your values.

services:
  personalcloud:
    image: personalcloud-backend
    restart: unless-stopped
    network_mode: host
    environment:
      CLOUD_URL: https://your-personalcloud-frontend.example.com
      SERVER_ID: your-server-id
      API_KEY: your-api-key
      ROOT_DIR: /data
      PORT: 4000
    volumes:
      - /media/abox/8c49f021-bf1c-47db-8bc3-9a343f63d2a5:/data
